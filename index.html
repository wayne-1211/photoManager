<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Photo Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>

    <header class="top">
        <h1>Photo Manager</h1>
        <nav class="tabs">
            <button class="tab-btn active" data-view="photosView">照片檢視</button>
            <button class="tab-btn" data-view="statsView">統計數據</button>
            <button class="tab-btn" data-view="manageView">照片管理</button>
            <button class="theme-toggle" id="themeToggle">☾ 深色模式</button>
        </nav>
    </header>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">處理中…</span>
    </div>

    <main>
        <!-- ============ PHOTOS VIEW ============ -->
        <section id="photosView" class="view active">
            <div class="toolbar">
                <label class="upload-btn" for="fileInput">上傳照片</label>
                <input id="fileInput" type="file" accept="image/jpeg,image/jpg,image/tiff" multiple>
                <div class="divider"></div>
                <div class="control-group">
                    <label>每排卡片數</label>
                    <input type="range" id="colSlider" min="1" max="8" value="4">
                    <span class="col-count" id="colCount">4</span>
                </div>
                <div class="photo-count" id="photoCount">尚未上傳照片</div>
                <button class="clear-btn" id="clearBtn">清除全部</button>
            </div>

            <details class="field-panel" id="fieldPanel">
                <summary>選擇卡片下方顯示的 EXIF 欄位</summary>
                <div class="chip-row" id="chipRow"></div>
            </details>

            <div id="grid" class="grid" style="grid-template-columns:repeat(4,1fr);"></div>
            <div id="photosPagination" class="pagination"></div>
            <div id="emptyState" class="empty-state">
                <div class="glyph">◎</div>
                <p>還沒有照片。</p>
                <p>點選「上傳照片」開始，支援多張 JPEG（Sony 相機拍攝的照片可解出創意風格 Creative Style）。每頁顯示 50 張，縮圖優先使用相機內建的 EXIF 縮圖以維持流暢度。</p>
            </div>
        </section>

        <!-- ============ STATS VIEW ============ -->
        <section id="statsView" class="view">
            <div class="stats-grid" id="statsGrid"></div>
        </section>

        <!-- ============ MANAGE VIEW (照片管理/快捷分類/匯出) ============ -->
        <section id="manageView" class="view">
            <div class="cat-editor" id="catEditor"></div>

            <div class="drop-zone" id="dropZone">
                <p>將照片拖曳到這裡，或 <b>點擊上傳</b>（與「照片檢視」共用同一批照片）</p>
                <label class="upload-btn" for="manageFileInput">選擇照片</label>
                <input id="manageFileInput" type="file" accept="image/jpeg,image/jpg,image/tiff" multiple>
            </div>

            <div class="manage-layout">
                <div class="preview-panel">
                    <h3>大圖預覽</h3>
                    <div id="previewWrap"></div>
                </div>

                <div class="thumb-sidebar">
                    <div class="toolbar" style="margin-bottom:14px;">
                        <div class="control-group">
                            <label>每排縮圖數</label>
                            <input type="range" id="mgmtColSlider" min="2" max="6" value="3">
                            <span class="col-count" id="mgmtColCount">3</span>
                        </div>
                        <div class="photo-count" id="mgmtPhotoCount">尚未上傳照片</div>
                    </div>
                    <button class="export-btn" id="exportBtn" style="width:100%; margin-bottom:14px;">匯出打包
                        (.zip)</button>
                    <div id="manageGrid" class="manage-grid" style="grid-template-columns:repeat(3,1fr);"></div>
                    <div id="managePagination" class="pagination"></div>
                    <div id="manageEmpty" class="empty-state">
                        <div class="glyph">◎</div>
                        <p>還沒有照片可以分類。</p>
                        <p>拖曳或點擊上方「選擇照片」開始上傳。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
